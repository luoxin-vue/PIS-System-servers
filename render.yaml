# Render Blueprint：Turso 托管数据库（免费额度见 https://turso.tech/pricing）
# 在 Turso 控制台创建数据库后，把 Database URL 与 Token 填到 Render 服务环境变量（Blueprint 首次创建后需在 Dashboard 手动添加，见下方 sync: false）。
services:
  - type: web
    name: inventory-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: '20.18.1'
      - key: JWT_SECRET
        generateValue: true
      - key: INITIAL_ADMIN_USERNAME
        value: admin
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # 可选：覆盖默认管理员密码（首次无用户时种子账户）
      # - key: INITIAL_ADMIN_PASSWORD
      #   sync: false
      # 不设 TURSO_* 时本地/默认仍可用 file: 本地 SQLite（仅开发）；Render 上请务必配置 Turso。
